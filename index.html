<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="La page personnelle de RaTawaX.">
  <title>RaTawaX — Bienvenue</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #09090b;
      --panel: rgba(24, 24, 27, .68);
      --text: #fafafa;
      --muted: #a1a1aa;
      --accent: #8b5cf6;
      --accent-2: #22d3ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 20%, rgba(139, 92, 246, .28), transparent 30%),
        radial-gradient(circle at 85% 75%, rgba(34, 211, 238, .20), transparent 28%),
        var(--bg);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle, black, transparent 75%);
      pointer-events: none;
    }

    main {
      position: relative;
      width: min(680px, calc(100% - 32px));
      padding: clamp(32px, 7vw, 64px);
      border: 1px solid rgba(255,255,255,.11);
      border-radius: 28px;
      text-align: center;
      background: var(--panel);
      box-shadow: 0 28px 90px rgba(0,0,0,.42);
      backdrop-filter: blur(18px);
      animation: reveal .8s ease-out both;
    }

    .badge {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      padding: 7px 12px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 999px;
      color: var(--muted);
      font-size: .82rem;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 16px #4ade80;
    }

    h1 {
      margin: 26px 0 14px;
      font-size: clamp(3rem, 11vw, 6.5rem);
      line-height: .9;
      letter-spacing: -.075em;
    }

    h1 span {
      color: transparent;
      background: linear-gradient(110deg, #c4b5fd, var(--accent), var(--accent-2));
      background-clip: text;
      -webkit-background-clip: text;
    }

    p {
      max-width: 480px;
      margin: 0 auto;
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.15rem);
      line-height: 1.7;
    }

    .actions {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 32px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 20px;
      border: 1px solid rgba(255,255,255,.13);
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      font-weight: 650;
      transition: transform .2s ease, border-color .2s ease, background .2s ease;
    }

    a:hover { transform: translateY(-2px); border-color: rgba(255,255,255,.3); }
    .primary { border: 0; background: linear-gradient(110deg, var(--accent), #6d5ce7); }
    .secondary { background: rgba(255,255,255,.045); }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(18px) scale(.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      main { animation: none; }
      a { transition: none; }
    }
  </style>
</head>
<body>
  <main>
    <div class="badge"><span class="dot"></span> En ligne</div>
    <h1>Salut, moi c’est <span>RaTawaX.</span></h1>
    <p>Bienvenue sur mon espace personnel. Cette page est hébergée gratuitement et automatiquement avec GitHub Pages.</p>
    <nav class="actions" aria-label="Liens principaux">
      <a class="primary" href="https://github.com/RaTawaX">Voir mon GitHub</a>
      <a class="secondary" href="https://github.com/RaTawaX/Myown">Code source</a>
    </nav>
  </main>
</body>
</html>
